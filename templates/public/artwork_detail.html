<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ artwork.title }} | Muksi Creations</title>
    <meta name="description" content="{{ artwork.description[:160] }}{% if artwork.description|length > 160 %}...{% endif %}" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.muksicreations.com/artworks/{{ artwork.id }}" />
    <meta property="og:title" content="{{ artwork.title }} | Muksi Creations" />
    <meta property="og:description" content="{{ artwork.description[:160] }}{% if artwork.description|length > 160 %}...{% endif %}" />
    <meta property="og:type" content="article" />
    <meta property="og:url" content="https://www.muksicreations.com/artworks/{{ artwork.id }}" />
    <meta property="og:image" content="https://www.muksicreations.com{{ url_for('public.artwork_image', artwork_id=artwork.id, slug=artwork.title|slugify) }}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ artwork.title }} | Muksi Creations" />
    <meta name="twitter:description" content="{{ artwork.description[:160] }}{% if artwork.description|length > 160 %}...{% endif %}" />
    <meta name="twitter:image" content="https://www.muksicreations.com{{ url_for('public.artwork_image', artwork_id=artwork.id, slug=artwork.title|slugify) }}" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VisualArtwork",
        "name": "{{ artwork.title|e }}",
        "description": "{{ artwork.description|e }}",
        "image": "https://www.muksicreations.com{{ url_for('public.artwork_image', artwork_id=artwork.id, slug=artwork.title|slugify) }}",
        "creator": {
          "@type": "Person",
          "name": "Muksi Creations (Muksina Arts)"
        },
        "artworkSurface": "Paper",
        "artform": "Portrait",
        "url": "https://www.muksicreations.com/artworks/{{ artwork.id }}",
        "contentLocation": "Tamale, Ghana"
      }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('public.home') }}">Muksi Creations</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="{{ url_for('public.home') }}">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('public.artworks') }}">Artworks</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="row g-4 align-items-start">
        <div class="col-lg-7">
          <div class="card shadow-sm">
            <img src="{{ url_for('public.artwork_image', artwork_id=artwork.id, slug=artwork.title|slugify) }}" class="card-img-top" alt="{{ artwork.title }} artwork by Muksi Creations">
          </div>
        </div>
        <div class="col-lg-5">
          <h1 class="h3 fw-bold">{{ artwork.title }}</h1>
          <span class="badge text-bg-light border mb-3 text-capitalize">{{ artwork.status }}</span>
          <p class="text-muted">{{ artwork.description }}</p>
          {% if artwork.hashtags %}
            <div class="d-flex flex-wrap gap-2 mb-3">
              {% for tag in artwork.hashtags.split(',') %}
                <span class="badge text-bg-light border">#{{ tag.strip() }}</span>
              {% endfor %}
            </div>
          {% endif %}
          <a class="btn btn-primary" href="{{ url_for('public.request_artwork', artwork_id=artwork.id) }}">Request Purchase</a>
          <a class="btn btn-outline-secondary ms-2" href="{{ url_for('public.artworks') }}">Back to Artworks</a>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
